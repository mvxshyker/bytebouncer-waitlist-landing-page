<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#BEFF00" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#BEFF00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#BEFF00" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#BEFF00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="630" fill="#BEFF00" opacity="0.6"/>

  <!-- Top section: logo + badge -->
  <g transform="translate(60, 52)">
    <!-- Shield -->
    <path d="M20 3L4 9V18C4 24.63 11.08 30.76 20 32.5C28.92 30.76 36 24.63 36 18V9L20 3Z" fill="rgba(190,255,0,0.12)" stroke="#BEFF00" stroke-width="2"/>
    <path d="M14 18L17.5 21.5L26 13" stroke="#BEFF00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Wordmark -->
    <text x="50" y="22" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="white">ByteBouncer</text>
    <!-- Beta badge -->
    <rect x="220" y="6" width="110" height="26" rx="13" fill="rgba(190,255,0,0.1)" stroke="rgba(190,255,0,0.25)" stroke-width="1"/>
    <circle cx="234" cy="19" r="4" fill="#BEFF00"/>
    <text x="244" y="23" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="rgba(190,255,0,0.8)">Beta · Free</text>
  </g>

  <!-- Main headline -->
  <text x="60" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="82" font-weight="900" fill="white" letter-spacing="-3">Your phone is</text>
  <text x="60" y="287" font-family="system-ui,-apple-system,sans-serif" font-size="90" font-weight="900" fill="#BEFF00" letter-spacing="-3">leaking data</text>
  <text x="60" y="383" font-family="system-ui,-apple-system,sans-serif" font-size="82" font-weight="900" fill="white" letter-spacing="-3">right now.</text>

  <!-- Subline -->
  <text x="62" y="432" font-family="system-ui,sans-serif" font-size="22" fill="#666666">Local firewall for iPhone · No VPN · 100% on-device</text>

  <!-- Divider -->
  <rect x="60" y="468" width="1080" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Bottom stats row -->
  <g transform="translate(60, 492)">
    <!-- Stat 1 -->
    <text x="0" y="36" font-family="system-ui,sans-serif" font-size="34" font-weight="900" fill="white">2.4 GB</text>
    <text x="0" y="58" font-family="system-ui,sans-serif" font-size="13" fill="#555555">avg. saved per week</text>

    <!-- Divider -->
    <rect x="160" y="8" width="1" height="60" fill="rgba(255,255,255,0.1)"/>

    <!-- Stat 2 -->
    <text x="180" y="36" font-family="system-ui,sans-serif" font-size="34" font-weight="900" fill="white">342K+</text>
    <text x="180" y="58" font-family="system-ui,sans-serif" font-size="13" fill="#555555">requests blocked daily</text>

    <!-- Divider -->
    <rect x="370" y="8" width="1" height="60" fill="rgba(255,255,255,0.1)"/>

    <!-- Stat 3 -->
    <text x="390" y="36" font-family="system-ui,sans-serif" font-size="34" font-weight="900" fill="white">100%</text>
    <text x="390" y="58" font-family="system-ui,sans-serif" font-size="13" fill="#555555">on-device · no servers</text>

    <!-- Right CTA pill -->
    <rect x="820" y="8" width="260" height="62" rx="31" fill="#BEFF00"/>
    <text x="950" y="46" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#0A0A0A" text-anchor="middle">Claim Your Beta Spot →</text>
  </g>
</svg>
